# AI Camp — HTTPS for camp.creaite.cn
# Install: cp to /etc/nginx/conf.d/ai-camp.conf && nginx -t && nginx -s reload

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# camp.creaite.cn — HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name camp.creaite.cn;
    return 301 https://$host$request_uri;
}

# camp.creaite.cn — HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name camp.creaite.cn;

    ssl_certificate     /etc/nginx/ssl/camp.creaite.cn/camp.creaite.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/camp.creaite.cn/camp.creaite.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50m;

    location /aisy {
        proxy_pass http://127.0.0.1:3013;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 180s;
        proxy_buffering off;
    }

    location = / {
        return 302 /aisy/;
    }
}

# IP / fallback — keep HTTP for direct IP access
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 122.51.185.212 _;

    client_max_body_size 50m;

    location /aisy {
        proxy_pass http://127.0.0.1:3013;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 180s;
        proxy_buffering off;
    }

    location = / {
        return 302 /aisy/;
    }
}
