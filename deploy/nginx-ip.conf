# AI Camp — IP 直连（备案期间 camp.creaite.cn 不可用）
# Install: cp to /etc/nginx/conf.d/ai-camp.conf && nginx -t && nginx -s reload

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 122.51.185.212 _;

    client_max_body_size 50m;

    # 媒体文件（学生作品图片/视频）直连 API 容器，绕过 Next.js 反代，
    # 多端同时加载作品看板时显著减轻 web 容器压力。
    location /aisy/uploads/ {
        proxy_pass http://127.0.0.1:3014/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering on;
        add_header Cache-Control "public, max-age=3600";
    }

    location /aisy {
        proxy_pass http://127.0.0.1:3013;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 180s;
        proxy_buffering off;
    }

    # 平板专版：/aisy_pad（独立 Next.js 容器，触控优化 UI）
    location /aisy_pad/uploads/ {
        proxy_pass http://127.0.0.1:3014/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        add_header Cache-Control "public, max-age=3600";
    }

    location /aisy_pad/api/ {
        proxy_pass http://127.0.0.1:3014/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_buffering off;
    }

    location /aisy_pad {
        proxy_pass http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 180s;
        proxy_buffering off;
    }

    location = / {
        return 302 /aisy/;
    }
}

# 备案完成、域名恢复后可改回 deploy/nginx-camp-ssl.conf
